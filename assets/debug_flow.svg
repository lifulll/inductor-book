<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="360" viewBox="0 0 1050 360">
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:1.4;rx:8}
    .warn{fill:#fff7ed;stroke:#c2410c}
    .txt{font:16px sans-serif;fill:#0f172a}
    .small{font:13px sans-serif;fill:#475569}
    .arrow{stroke:#334155;stroke-width:2;marker-end:url(#a)}
  </style>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <rect class="box" x="50" y="70" width="180" height="75"/><text class="txt" x="82" y="103">graph break</text><text class="small" x="76" y="127">TORCH_LOGS=graph_breaks</text>
  <line class="arrow" x1="230" y1="108" x2="310" y2="108"/>
  <rect class="box" x="310" y="70" width="180" height="75"/><text class="txt" x="346" y="103">recompile</text><text class="small" x="333" y="127">TORCH_LOGS=recompiles</text>
  <line class="arrow" x1="490" y1="108" x2="570" y2="108"/>
  <rect class="box" x="570" y="70" width="180" height="75"/><text class="txt" x="605" y="103">output code</text><text class="small" x="599" y="127">TORCH_LOGS=output_code</text>
  <line class="arrow" x1="750" y1="108" x2="830" y2="108"/>
  <rect class="warn" x="830" y="70" width="180" height="75"/><text class="txt" x="869" y="103">debug dir</text><text class="small" x="852" y="127">TORCH_COMPILE_DEBUG=1</text>
  <rect class="box" x="190" y="220" width="260" height="78"/><text class="txt" x="226" y="253">generated artifacts</text><text class="small" x="224" y="276">FX graph, IR, output_code.py, SVG</text>
  <line class="arrow" x1="920" y1="145" x2="450" y2="247"/>
  <rect class="box" x="600" y="220" width="260" height="78"/><text class="txt" x="646" y="253">minifier/repro</text><text class="small" x="626" y="276">reduce a failure to a small case</text>
</svg>

